name: android

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v7
    
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext
        
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
          distribution: 'temurin'
          java-version: '17'
          
    - name: Inject Game, Fix Layout, and Completely Erase Names
      run: |
        # 1. تحميل لعبة ماينكلونيا في مجلد الألعاب الرئيسي
        git clone https://codeberg.org/Mineclonia/Mineclonia.git games/mineclonia
        
        # 2. إجبار المحرك على جعل ماينكلونيا هي اللعبة الافتراضية عند التشغيل
        sed -i 's/"default_game", "[^*"/"default_game", "mineclonia"/g' src/defaultsettings.cpp
        
        # 3. [إصلاح الحجم والتداخل]: حذف أوامر التكبير اليدوية تماماً لكي يتفعل نظام التكيف التلقائي 
        # للمحرك على أندرويد، مما يجعل القوائم تملأ الشاشة وتترتب الأزرار تلقائياً دون أي تداخل بصري.
        
        # 4. [خدعة المسافة الفارغة]: تعديل ملف الإعدادات للعبة ليكون الاسم مسافة فارغة لحجب نظام الـ Fallback
        sed -i 's/title =.*/title =  /g' games/mineclonia/game.conf
        
        # 5. تدمير وحذف كافة الصور والشعارات والأيقونات الخاصة بماينكلونيا نهائياً من مجلد اللعبة
        find games/mineclonia/ -name "*.png" -type f \( -name "*header*" -o -name "*logo*" -o -name "*icon*" \) -delete
        rm -f games/mineclonia/menu/header.png
        rm -f games/mineclonia/menu/icon.png
        
        # 6. التطهير الشامل لـ Luanti واسم اللعبة من جذور ملفات الـ C++ والـ Lua لضمان عدم ظهورها في القوائم أو الأشرطة العلوية
        find src/ -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/"Luanti"/" "/g' {} +
        find builtin/mainmenu/ -type f -name "*.lua" -exec sed -i 's/"Luanti"/" "/g' {} +
        find builtin/mainmenu/ -type f -name "*.lua" -exec sed -i 's/core.get_project_name()/" "/g' {} +
        find builtin/mainmenu/ -type f -name "*.lua" -exec sed -i 's/game.title/" "/g' {} +
        find builtin/mainmenu/ -type f -name "*.lua" -exec sed -i 's/gamedata.title/" "/g' {} +
        
        # 7. الحقن البرمجي الصارم داخل Gradle لدمج اللعبة النظيفة والمعدلة بالكامل
        cat << 'EOF' >> android/app/build.gradle

        tasks.matching { it.name == "prepareAssets" }.all {
            doLast {
                copy {
                    from "../../games/mineclonia"
                    into "build/assets/games/mineclonia"
                }
            }
        }
        EOF
        
    - name: Build AAB with Gradle
      run: cd android; ./gradlew bundlerelease
      
    - name: Build APKs with Gradle
      run: cd android; ./gradlew assemblerelease
      
    - name: Save AAB artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        
    - name: Save armeabi artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-armeabi-v7a.apk
        path: android/app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
        
    - name: Save arm64 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-arm64-v8a.apk
        path: android/app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk
        
    - name: Save x86 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-x86.apk
        path: android/app/build/outputs/apk/release/app-x86-release-unsigned.apk
        
    - name: Save x86_64 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-x86_64.apk
        path: android/app/build/outputs/apk/release/app-x86_64-release-unsigned.apk

