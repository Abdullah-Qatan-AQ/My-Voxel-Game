name: android

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'src/**.[ch]'
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
          distribution: 'temurin'
          java-version: '17'
          
    - name: Inject Game, Clean UI, Erase Brands and Adjust Controls
      run: |
        # 1. إبادة العلامة التجارية Luanti
        find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.txt" -o -name "*.po" \) -exec sed -i 's/Luanti/MyGame/g' {} +
        find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.txt" -o -name "*.po" \) -exec sed -i 's/luanti/mygame/g' {} +
        
        # 2. تحميل اللعبة
        git clone https://codeberg.org/Mineclonia/Mineclonia.git games/mygame
        
        # 3. إعدادات اللعبة
        cat << 'EOF' > games/mygame/game.conf
        name = mygame
        title = My Voxel Game
        description = A survival sandbox game.
        allowed_privs = interact, shout, fast, fly, noclip, privs, basic_privs
        EOF
        
        # 4. حذف صور القوائم
        rm -f games/mygame/menu/*.png games/mygame/screenshot.png
        
        # 5. ضبط إعدادات المحرك
        sed -i 's/"default_game", "minetest"/"default_game", "mygame"/g' src/defaultsettings.cpp
        sed -i 's/"gui_scaling", "[^"]*"/"gui_scaling", "1.0"/g' src/defaultsettings.cpp
        
        # 6. إصلاح أزرار التحكم (مع البحث الآمن عن الملف)
        GUI_FILE=$(find src -name "touchscreengui.cpp" | head -n 1)
        if [ -f "$GUI_FILE" ]; then
            sed -i 's/m_screensize\.Y[ \t]*-/m_screensize.Y - 120 -/g' "$GUI_FILE"
            sed -i 's/screensize\.Y[ \t]*-/screensize.Y - 120 -/g' "$GUI_FILE"
        fi
        
        # 7. دمج اللعبة مع نظام الأندرويد
        cat << 'EOF' >> android/app/build.gradle
        tasks.matching { it.name == "prepareAssets" }.all {
            doLast {
                copy {
                    from "../../games/mygame"
                    into "build/assets/games/mygame"
                }
            }
        }
        EOF
        
    - name: Build AAB and APKs with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew bundlerelease
        ./gradlew assemblerelease
      
    - name: Save Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MyVoxelGame-Artifacts
        path: |
          android/app/build/outputs/bundle/release/*.aab
          android/app/build/outputs/apk/release/*.apk

