name: android

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'src/**.[ch]'
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext unzip wget
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
          distribution: 'temurin'
          java-version: '17'
          
    - name: Inject Game, Scale UI, Background, Erase Branding and Add Mods
      run: |
        # 1. مسح كلمة Luanti من الكود وقوائم اللعبة (Lua)
        find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.txt" -o -name "*.po" \) -not -name "CMakeLists.txt" -exec sed -i 's/Luanti/My Voxel Game/g' {} +
        find builtin/ -type f -name "*.lua" -exec sed -i 's/Luanti/My Voxel Game/g' {} +
        find builtin/ -type f -name "*.lua" -exec sed -i 's/luanti/my voxel game/g' {} +
        
        # 2. إخفاء شعار Luanti الضخم (استبدال الصور بصورة شفافة)
        PNG_B64="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
        for img in $(find textures/ -type f \( -name "*header.png" -o -name "*logo.png" \)); do
            echo "$PNG_B64" | base64 -d > "$img"
        done
        
        # 3. تحميل لعبة ماينكلونيا
        git clone https://codeberg.org/Mineclonia/Mineclonia.git games/mygame
        
        # 4. حل مشكلة الـ (mcl_core)
        echo "mcl_core" >> games/mygame/mods/CORE/_mcl_autogroup/depends.txt
        MOD_CONF="games/mygame/mods/CORE/_mcl_autogroup/mod.conf"
        if [ -f "$MOD_CONF" ]; then
            sed -i 's/depends =/depends = mcl_core, /g' "$MOD_CONF"
        fi
        
        # 5. إعدادات اللعبة
        cat << 'EOF' > games/mygame/game.conf
        name = mygame
        title = My Voxel Game
        EOF
        
        rm -f games/mygame/menu/*.png games/mygame/screenshot.png
        
        # [تعديل الخلفية الشامل لجميع القوائم والصفحات]:
        if [ -f "my_background.png" ]; then
            mkdir -p games/mygame/menu textures/base/pack builtin/textures
            cp my_background.png games/mygame/menu/background.png
            cp my_background.png games/mygame/menu/menu_background.png
            cp my_background.png textures/base/pack/background.png
            cp my_background.png textures/base/pack/menu_background.png
            cp my_background.png builtin/textures/menu_background.png || true
            cp my_background.png builtin/textures/background.png || true
            
            find builtin/mainmenu/ -type f -name "*.lua" -exec sed -i 's/mainmenu_background_texture = ""/mainmenu_background_texture = "menu_background.png"/g' {} +
            find builtin/mainmenu/ -type f -name "*.lua" -exec sed -i 's/set("mainmenu_background_texture", "")/set("mainmenu_background_texture", "menu_background.png")/g' {} +
            
            sed -i '/"default_game"/a \ \ \ \ g_settings->setDefault("menuclouds", "false");' src/defaultsettings.cpp
            sed -i '/"default_game"/a \ \ \ \ g_settings->setDefault("mainmenu_background_texture", "menu_background.png");' src/defaultsettings.cpp
        fi
        
        # 6. إجبار اللعبة للعمل وضبط الواجهة
        sed -i 's/"default_game", "minetest"/"default_game", "mygame"/g' src/defaultsettings.cpp
        sed -i 's/"gui_scaling", "[^"]*"/"gui_scaling", "1.15"/g' src/defaultsettings.cpp

        # 7. إصلاح أزرار التحكم للهواتف
        GUI_FILE=$(find src -name "touchscreengui.cpp" | head -n 1)
        if [ -f "$GUI_FILE" ]; then
            sed -i 's/m_screensize\.Y[ \t]*-/m_screensize.Y - 120 -/g' "$GUI_FILE"
            sed -i 's/screensize\.Y[ \t]*-/screensize.Y - 120 -/g' "$GUI_FILE"
        fi
        
        # 8. دمج المودات تلقائياً من متجر لونتي (تمت إزالة مود الرسوميات بنجاح)
        # المود الأول: mcl_decor
        wget -qO mcl_decor.zip "https://content.luanti.org/packages/rudzik8/mcl_decor/releases/35460/download/"
        unzip -q mcl_decor.zip -d games/mygame/mods/
        rm mcl_decor.zip
        
        # المود المساعد لـ mcl_decor (mcl_cozy)
        wget -qO mcl_cozy.zip "https://content.luanti.org/packages/rudzik8/mcl_cozy/releases/33419/download/"
        unzip -q mcl_cozy.zip -d games/mygame/mods/
        rm mcl_cozy.zip
        
        # المود الثاني: mcl_extra_structures
        wget -qO mcl_extra_structures.zip "https://content.luanti.org/packages/mt-mods/mcl_extra_structures/releases/34000/download/"
        unzip -q mcl_extra_structures.zip -d games/mygame/mods/
        rm mcl_extra_structures.zip
        
        # 9. دمج الأصول داخل الأندرويد
        cat << 'EOF' >> android/app/build.gradle
        tasks.matching { it.name == "prepareAssets" }.all {
            doLast {
                copy { from "../../games/mygame"; into "build/assets/games/mygame" }
            }
        }
        EOF

    - name: Build Specific ABI
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease -Pandroid.abifilters=${{ matrix.abi }}
      
    - name: Save Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyVoxelGame-${{ matrix.abi }}
        path: android/app/build/outputs/apk/release/*-${{ matrix.abi }}-release-unsigned.apk

