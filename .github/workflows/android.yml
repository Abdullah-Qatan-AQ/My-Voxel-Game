name: android

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v7
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
          distribution: 'temurin'
          java-version: '17'
    - name: Download Mineclonia and Inject Smart Indexer
      run: |
        # 1. إنشاء مجلد الأصول الداخلي وتحميل اللعبة فيه مباشرة لضمان دخولها في الحجم
        mkdir -p android/app/src/main/assets/games
        git clone https://codeberg.org/Mineclonia/Mineclonia.git android/app/src/main/assets/games/mineclonia
        
        # 2. تعيين اللعبة كافتراضية عند الإقلاع الأول
        echo "default_game = mineclonia" > android/app/src/main/assets/minetest.conf

        # 3. حقن سكربت الفهرسة الذكي داخل build.gradle دون الاعتماد على مهام مفقودة
        cat << 'EOF' >> android/app/build.gradle

        tasks.register("indexMineclonia") {
            doLast {
                def assetsDir = file("src/main/assets")
                def indexFile = file("src/main/assets/index.txt")
                if (indexFile.exists()) {
                    fileTree("src/main/assets/games/mineclonia").each { f ->
                        def relativePath = assetsDir.toPath().relativize(f.toPath()).toString().replace('\\', '/')
                        if (!indexFile.text.contains(relativePath)) {
                            indexFile.append("\n" + relativePath)
                        }
                    }
                }
            }
        }

        tasks.configureEach { task ->
            if (task.name.startsWith("merge") && task.name.endsWith("Assets")) {
                task.dependsOn("indexMineclonia")
            }
        }
        EOF
    - name: Build AAB with Gradle
      run: cd android; ./gradlew bundlerelease
    - name: Build APKs with Gradle
      run: cd android; ./gradlew assemblerelease
    - name: Save AAB artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
    - name: Save armeabi artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-armeabi-v7a.apk
        path: android/app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
    - name: Save arm64 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-arm64-v8a.apk
        path: android/app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk
    - name: Save x86 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-x86.apk
        path: android/app/build/outputs/apk/release/app-x86-release-unsigned.apk
    - name: Save x86_64 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-x86_64.apk
        path: android/app/build/outputs/apk/release/app-x86_64-release-unsigned.apk
