name: android

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v7
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
          distribution: 'temurin'
          java-version: '17'
    - name: Hijack Devtest with Mineclonia
      run: |
        # 1. حذف لعبة الاختبارات الأصلية تماماً لتفريغ المجلد
        rm -rf games/devtest
        
        # 2. تحميل ماينكلونيا مباشرة داخل مجلد devtest لخدعة نظام البناء
        git clone https://codeberg.org/Mineclonia/Mineclonia.git games/devtest
        
        # 3. تعديل المعرف الداخلي للعبة ليطابق اسم المجلد لضمان الفهرسة السليمة
        sed -i 's/name =.*/name = devtest/g' games/devtest/game.conf
        sed -i 's/title =.*/title = Mineclonia/g' games/devtest/game.conf
        
        # 4. إجبار المحرك على فتح المجلد تلقائياً عند تشغيل اللعبة
        echo "default_game = devtest" >> minetest.conf.example
    - name: Build AAB with Gradle
      run: cd android; ./gradlew bundlerelease
    - name: Build APKs with Gradle
      run: cd android; ./gradlew assemblerelease
    - name: Save AAB artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
    - name: Save armeabi artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-armeabi-v7a.apk
        path: android/app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
    - name: Save arm64 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-arm64-v8a.apk
        path: android/app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk
    - name: Save x86 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-x86.apk
        path: android/app/build/outputs/apk/release/app-x86-release-unsigned.apk
    - name: Save x86_64 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-x86_64.apk
        path: android/app/build/outputs/apk/release/app-x86_64-release-unsigned.apk

